<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CodeWhale</title>
<style>
/* ── Reset & Variables ── */
:root {
  --bg: #181715; --bg-panel: #1f1e1b; --bg-elevated: #252320;
  --bg-input: #2a2825; --bg-hover: #302d28; --border: #3a3733;
  --text: #faf9f5; --text-muted: #a09d96; --text-dim: #6b6860;
  --accent: #cc785c; --accent-hover: #a9583e; --accent-soft: rgba(204,120,92,0.12);
  --teal: #5db8a6; --green: #5db872; --red: #c64545; --amber: #d4a017;
  --purple: #9b8ec4;
  --radius: 8px; --radius-lg: 12px; --radius-xl: 16px;
  --sidebar-w: 56px; --thread-w: 280px; --panel-w: 340px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
  --transition: 0.15s ease;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif; background:var(--bg); color:var(--text); height:100vh; overflow:hidden; font-size:14px; line-height:1.5; }
button { font-family:inherit; cursor:pointer; border:none; background:none; color:var(--text); }
input, textarea, select { font-family:inherit; font-size:inherit; color:var(--text); background:var(--bg-input); border:1px solid var(--border); border-radius:var(--radius); padding:8px 12px; outline:none; }
input:focus, textarea:focus, select:focus { border-color:var(--accent); }
textarea { resize:none; }
::-webkit-scrollbar { width:6px; height:6px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background:var(--text-dim); }

/* ── Auth Gate ── */
#auth-gate { display:flex; align-items:center; justify-content:center; height:100vh; background:var(--bg); }
.auth-card { background:var(--bg-elevated); border:1px solid var(--border); border-radius:var(--radius-xl); padding:48px; width:420px; text-align:center; }
.auth-card .logo { font-size:32px; font-weight:700; margin-bottom:4px; }
.auth-card .logo span { color:var(--accent); }
.auth-card p { color:var(--text-muted); margin-bottom:32px; font-size:13px; }
.auth-card label { display:block; text-align:left; font-size:11px; color:var(--text-muted); margin-bottom:4px; text-transform:uppercase; letter-spacing:0.8px; font-weight:600; }
.auth-card input { width:100%; margin-bottom:16px; }
.auth-card button.connect { width:100%; padding:12px; background:var(--accent); color:#fff; border-radius:var(--radius); font-weight:600; font-size:14px; margin-top:8px; transition:background var(--transition); }
.auth-card button.connect:hover { background:var(--accent-hover); }
.auth-error { color:var(--red); font-size:12px; margin-bottom:12px; display:none; text-align:left; }

/* ── Main Layout ── */
#app { display:none; height:100vh; }
.app-layout { display:flex; height:100%; }

/* ── Icon Sidebar ── */
.icon-sidebar { width:var(--sidebar-w); min-width:var(--sidebar-w); background:var(--bg-panel); border-right:1px solid var(--border); display:flex; flex-direction:column; align-items:center; padding:12px 0; gap:4px; z-index:10; }
.icon-sidebar .logo-btn { width:40px; height:40px; border-radius:var(--radius-lg); display:flex; align-items:center; justify-content:center; font-size:20px; font-weight:700; color:var(--accent); margin-bottom:8px; }
.icon-sidebar .logo-btn:hover { background:var(--accent-soft); }
.icon-sidebar button { width:40px; height:40px; border-radius:var(--radius); display:flex; align-items:center; justify-content:center; color:var(--text-dim); transition:all var(--transition); position:relative; }
.icon-sidebar button:hover { color:var(--text); background:var(--bg-hover); }
.icon-sidebar button.active { color:var(--accent); background:var(--accent-soft); }
.icon-sidebar button .badge { position:absolute; top:4px; right:4px; width:8px; height:8px; background:var(--accent); border-radius:50%; }
.icon-sidebar .spacer { flex:1; }
.icon-sidebar .nav-group { display:flex; flex-direction:column; gap:2px; }

/* ── Thread Sidebar ── */
.thread-sidebar { width:var(--thread-w); min-width:var(--thread-w); background:var(--bg-panel); border-right:1px solid var(--border); display:flex; flex-direction:column; }
.thread-header { padding:16px; border-bottom:1px solid var(--border); }
.thread-header h2 { font-size:14px; font-weight:600; margin-bottom:12px; display:flex; align-items:center; justify-content:space-between; }
.thread-header h2 span { color:var(--text-dim); font-weight:400; font-size:12px; }
.thread-search { width:100%; padding:8px 12px; font-size:13px; }
.thread-actions { display:flex; gap:8px; margin-top:8px; }
.thread-actions button { flex:1; padding:6px; font-size:12px; border-radius:var(--radius); background:var(--bg-input); color:var(--text-muted); border:1px solid var(--border); transition:all var(--transition); }
.thread-actions button:hover { border-color:var(--accent); color:var(--text); }
.thread-list { flex:1; overflow-y:auto; padding:8px; }
.thread-item { padding:10px 12px; border-radius:var(--radius); cursor:pointer; margin-bottom:2px; transition:background var(--transition); position:relative; }
.thread-item:hover { background:var(--bg-hover); }
.thread-item.active { background:var(--accent-soft); border-left:3px solid var(--accent); }
.thread-item .t-title { font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-weight:500; }
.thread-item .t-meta { font-size:11px; color:var(--text-dim); margin-top:2px; display:flex; align-items:center; gap:6px; }
.thread-item .t-status { display:inline-block; width:6px; height:6px; border-radius:50%; }
.s-completed { background:var(--green); } .s-in_progress { background:var(--amber); animation:pulse 1s infinite; } .s-failed { background:var(--red); }
.thread-item .t-actions { display:none; position:absolute; right:8px; top:50%; transform:translateY(-50%); gap:4px; }
.thread-item:hover .t-actions { display:flex; }
.thread-item .t-actions button { width:24px; height:24px; border-radius:4px; font-size:11px; color:var(--text-dim); }
.thread-item .t-actions button:hover { background:var(--bg-elevated); color:var(--text); }

/* ── Main Chat Area ── */
.chat-area { flex:1; display:flex; flex-direction:column; min-width:0; position:relative; }
.chat-header { padding:12px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px; min-height:52px; background:var(--bg-panel); }
.chat-header .ch-title { font-weight:600; font-size:14px; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.chat-header .ch-title[contenteditable] { cursor:text; padding:2px 6px; border-radius:4px; }
.chat-header .ch-title[contenteditable]:focus { background:var(--bg-input); outline:none; }
.ch-tag { font-size:11px; padding:3px 8px; border-radius:4px; background:var(--bg-elevated); border:1px solid var(--border); color:var(--text-muted); cursor:pointer; transition:all var(--transition); }
.ch-tag:hover { border-color:var(--accent); color:var(--text); }
.ch-mode { font-size:11px; padding:3px 8px; border-radius:4px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; }
.ch-mode.agent { background:rgba(93,184,166,0.15); color:var(--teal); }
.ch-mode.plan { background:rgba(155,142,196,0.15); color:var(--purple); }
.ch-mode.yolo { background:rgba(204,120,92,0.15); color:var(--accent); }
.ch-btn { width:32px; height:32px; border-radius:var(--radius); display:flex; align-items:center; justify-content:center; color:var(--text-dim); transition:all var(--transition); }
.ch-btn:hover { background:var(--bg-hover); color:var(--text); }

/* ── Messages ── */
#messages { flex:1; overflow-y:auto; padding:20px 0; scroll-behavior:smooth; }
.msg-wrap { padding:4px 20px; }
.msg { margin-bottom:16px; max-width:88%; animation:fadeIn 0.2s ease; }
@keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }
.msg-user { margin-left:auto; }
.msg-agent { margin-right:auto; }
.msg-label { font-size:11px; color:var(--text-dim); margin-bottom:4px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; }
.msg-user .msg-label { text-align:right; }
.msg-bubble { padding:12px 16px; border-radius:var(--radius-lg); line-height:1.7; font-size:14px; white-space:pre-wrap; word-break:break-word; }
.msg-user .msg-bubble { background:var(--accent); color:#fff; border-bottom-right-radius:4px; }
.msg-agent .msg-bubble { background:var(--bg-elevated); border:1px solid var(--border); border-bottom-left-radius:4px; }

/* ── Tool Call ── */
.tool-call { margin:8px 20px; background:var(--bg-input); border:1px solid var(--border); border-radius:var(--radius-lg); overflow:hidden; max-width:88%; animation:fadeIn 0.2s ease; }
.tool-header { padding:10px 14px; font-size:12px; font-weight:600; cursor:pointer; display:flex; align-items:center; gap:8px; transition:background var(--transition); }
.tool-header:hover { background:var(--bg-elevated); }
.tool-header .tool-icon { color:var(--teal); font-size:14px; }
.tool-header .tool-name { flex:1; }
.tool-header .tool-status { font-size:11px; padding:2px 6px; border-radius:4px; }
.tool-header .tool-status.running { background:rgba(212,160,23,0.15); color:var(--amber); }
.tool-header .tool-status.done { background:rgba(93,120,114,0.15); color:var(--green); }
.tool-header .tool-status.error { background:rgba(198,69,69,0.15); color:var(--red); }
.tool-header .arrow { color:var(--text-dim); transition:transform 0.15s; font-size:10px; }
.tool-header .arrow.open { transform:rotate(90deg); }
.tool-body { display:none; padding:12px 14px; border-top:1px solid var(--border); font-size:12px; font-family:'SF Mono','Menlo','Consolas',monospace; color:var(--text-muted); white-space:pre-wrap; max-height:400px; overflow-y:auto; background:var(--bg); }
.tool-body.open { display:block; }

/* ── Reasoning ── */
.reasoning { margin:8px 20px; padding:12px 14px; background:rgba(93,184,166,0.06); border-left:3px solid var(--teal); border-radius:0 var(--radius) var(--radius) 0; max-width:88%; }
.reasoning-header { font-size:11px; color:var(--teal); font-weight:600; margin-bottom:6px; cursor:pointer; display:flex; align-items:center; gap:6px; }
.reasoning-body { font-size:13px; color:var(--text-muted); line-height:1.6; display:none; }
.reasoning-body.open { display:block; }

/* ── Streaming ── */
.streaming-dot { display:inline-block; width:6px; height:6px; background:var(--accent); border-radius:50%; animation:pulse 1s infinite; margin-left:4px; vertical-align:middle; }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }
.streaming-bar { height:2px; background:linear-gradient(90deg,transparent,var(--accent),transparent); animation:streamSlide 1.5s infinite; position:absolute; bottom:0; left:0; right:0; display:none; }
.streaming-bar.active { display:block; }
@keyframes streamSlide { 0% { transform:translateX(-100%); } 100% { transform:translateX(100%); } }

/* ── Status Bar ── */
.status-bar { padding:6px 20px; border-top:1px solid var(--border); background:var(--bg-panel); display:flex; align-items:center; gap:8px; font-size:11px; color:var(--text-dim); min-height:32px; flex-wrap:wrap; }
.status-chip { padding:2px 8px; border-radius:4px; background:var(--bg-elevated); border:1px solid var(--border); display:inline-flex; align-items:center; gap:4px; white-space:nowrap; }
.status-chip .dot { width:6px; height:6px; border-radius:50%; }
.status-chip .dot.green { background:var(--green); }
.status-chip .dot.amber { background:var(--amber); }
.status-spacer { flex:1; }

/* ── Input Area ── */
#input-area { padding:16px 20px; border-top:1px solid var(--border); background:var(--bg-panel); position:relative; }
.input-row { display:flex; gap:8px; align-items:flex-end; }
#prompt-input { flex:1; min-height:44px; max-height:200px; line-height:1.5; padding:10px 14px; font-size:14px; }
.input-actions { display:flex; gap:4px; }
.input-btn { width:40px; height:44px; border-radius:var(--radius); display:flex; align-items:center; justify-content:center; color:var(--text-dim); transition:all var(--transition); }
.input-btn:hover { color:var(--text); background:var(--bg-hover); }
.input-btn.primary { background:var(--accent); color:#fff; }
.input-btn.primary:hover { background:var(--accent-hover); }
.input-btn.primary:disabled { opacity:0.4; cursor:not-allowed; }
.input-hint { font-size:11px; color:var(--text-dim); margin-top:6px; display:flex; align-items:center; gap:12px; }
.input-hint kbd { padding:1px 5px; background:var(--bg-elevated); border:1px solid var(--border); border-radius:3px; font-size:10px; font-family:inherit; }

/* ── Empty State ── */
.empty-state { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; color:var(--text-dim); gap:12px; }
.empty-state .es-icon { font-size:48px; opacity:0.3; }
.empty-state p { font-size:14px; }
.empty-state .es-actions { display:flex; gap:8px; margin-top:8px; }
.empty-state .es-actions button { padding:8px 16px; background:var(--bg-elevated); border:1px solid var(--border); border-radius:var(--radius); font-size:13px; color:var(--text-muted); transition:all var(--transition); }
.empty-state .es-actions button:hover { border-color:var(--accent); color:var(--text); }

/* ── Right Panel ── */
.right-panel { width:0; overflow:hidden; background:var(--bg-panel); border-left:1px solid var(--border); transition:width 0.2s ease; display:flex; flex-direction:column; }
.right-panel.open { width:var(--panel-w); min-width:var(--panel-w); }
.panel-header { padding:16px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:8px; }
.panel-header h3 { font-size:14px; font-weight:600; flex:1; }
.panel-close { width:28px; height:28px; border-radius:var(--radius); display:flex; align-items:center; justify-content:center; color:var(--text-dim); }
.panel-close:hover { background:var(--bg-hover); color:var(--text); }
.panel-body { flex:1; overflow-y:auto; padding:16px; }
.panel-section { margin-bottom:20px; }
.panel-section h4 { font-size:12px; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.8px; margin-bottom:8px; font-weight:600; }

/* ── Settings Form ── */
.setting-group { margin-bottom:16px; }
.setting-group label { display:block; font-size:12px; color:var(--text-muted); margin-bottom:4px; font-weight:600; }
.setting-group select, .setting-group input { width:100%; }
.setting-group .hint { font-size:11px; color:var(--text-dim); margin-top:4px; }

/* ── Task/Agent/MCP Items ── */
.list-item { padding:10px 12px; background:var(--bg-elevated); border:1px solid var(--border); border-radius:var(--radius); margin-bottom:8px; }
.list-item .li-title { font-size:13px; font-weight:500; margin-bottom:2px; }
.list-item .li-meta { font-size:11px; color:var(--text-dim); }
.list-item .li-actions { display:flex; gap:4px; margin-top:8px; }
.list-item .li-actions button { padding:4px 10px; font-size:11px; border-radius:4px; background:var(--bg-input); border:1px solid var(--border); color:var(--text-muted); }
.list-item .li-actions button:hover { border-color:var(--accent); color:var(--text); }

/* ── Command Palette ── */
.palette-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:100; display:none; align-items:flex-start; justify-content:center; padding-top:15vh; }
.palette-overlay.open { display:flex; }
.palette { width:520px; background:var(--bg-elevated); border:1px solid var(--border); border-radius:var(--radius-xl); box-shadow:var(--shadow); overflow:hidden; }
.palette-input { width:100%; padding:16px 20px; font-size:15px; background:transparent; border:none; border-bottom:1px solid var(--border); border-radius:0; }
.palette-input:focus { border-color:var(--border); }
.palette-results { max-height:360px; overflow-y:auto; padding:8px; }
.palette-item { padding:10px 12px; border-radius:var(--radius); cursor:pointer; display:flex; align-items:center; gap:10px; }
.palette-item:hover, .palette-item.selected { background:var(--bg-hover); }
.palette-item .pi-icon { width:28px; height:28px; border-radius:6px; background:var(--bg-input); display:flex; align-items:center; justify-content:center; font-size:13px; color:var(--text-muted); }
.palette-item .pi-text { flex:1; }
.palette-item .pi-name { font-size:13px; font-weight:500; }
.palette-item .pi-desc { font-size:11px; color:var(--text-dim); }
.palette-item .pi-shortcut { font-size:11px; color:var(--text-dim); }
.palette-item .pi-shortcut kbd { padding:1px 5px; background:var(--bg-input); border:1px solid var(--border); border-radius:3px; font-size:10px; }

/* ── Approval Modal ── */
.approval-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:100; display:none; align-items:center; justify-content:center; }
.approval-overlay.open { display:flex; }
.approval-card { width:480px; background:var(--bg-elevated); border:1px solid var(--border); border-radius:var(--radius-xl); box-shadow:var(--shadow); overflow:hidden; }
.approval-card.destructive { border-color:var(--red); }
.approval-card .ac-header { padding:20px 24px 16px; }
.approval-card .ac-header h3 { font-size:16px; margin-bottom:4px; }
.approval-card .ac-header p { font-size:13px; color:var(--text-muted); }
.approval-card .ac-body { padding:0 24px 16px; }
.approval-card .ac-tool { padding:12px; background:var(--bg); border:1px solid var(--border); border-radius:var(--radius); font-family:'SF Mono','Menlo',monospace; font-size:12px; color:var(--text-muted); max-height:200px; overflow-y:auto; white-space:pre-wrap; }
.approval-card .ac-actions { padding:16px 24px; border-top:1px solid var(--border); display:flex; gap:8px; justify-content:flex-end; }
.approval-card .ac-actions button { padding:8px 20px; border-radius:var(--radius); font-size:13px; font-weight:600; transition:all var(--transition); }
.ac-btn-deny { background:var(--bg-input); border:1px solid var(--border); color:var(--text-muted); }
.ac-btn-deny:hover { border-color:var(--red); color:var(--red); }
.ac-btn-allow { background:var(--green); color:#fff; }
.ac-btn-allow:hover { opacity:0.9; }
.ac-btn-allow-session { background:var(--teal); color:#fff; }
.ac-btn-allow-session:hover { opacity:0.9; }

/* ── Markdown ── */
.msg-bubble code { background:rgba(255,255,255,0.08); padding:1px 5px; border-radius:4px; font-size:13px; font-family:'SF Mono','Menlo','Consolas',monospace; }
.msg-bubble pre { background:var(--bg); border:1px solid var(--border); border-radius:var(--radius); padding:0; margin:8px 0; overflow:hidden; }
.msg-bubble pre .code-header { padding:8px 12px; background:var(--bg-panel); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; font-size:11px; color:var(--text-dim); }
.msg-bubble pre .code-header button { font-size:11px; color:var(--text-dim); padding:2px 8px; border-radius:4px; }
.msg-bubble pre .code-header button:hover { background:var(--bg-hover); color:var(--text); }
.msg-bubble pre code { display:block; padding:12px; overflow-x:auto; background:none; font-size:13px; line-height:1.6; }
.msg-bubble strong { font-weight:600; }
.msg-bubble em { font-style:italic; }
.msg-bubble a { color:var(--teal); text-decoration:none; }
.msg-bubble a:hover { text-decoration:underline; }
.msg-bubble ul, .msg-bubble ol { margin:4px 0 4px 20px; }
.msg-bubble li { margin:2px 0; }
.msg-bubble h1, .msg-bubble h2, .msg-bubble h3 { margin:12px 0 4px; font-weight:600; }
.msg-bubble h1 { font-size:18px; } .msg-bubble h2 { font-size:16px; } .msg-bubble h3 { font-size:14px; }
.msg-bubble blockquote { border-left:3px solid var(--border); padding-left:12px; color:var(--text-muted); margin:8px 0; }
.msg-bubble table { border-collapse:collapse; margin:8px 0; width:100%; }
.msg-bubble th, .msg-bubble td { padding:6px 12px; border:1px solid var(--border); text-align:left; font-size:13px; }
.msg-bubble th { background:var(--bg-panel); font-weight:600; }
.msg-bubble hr { border:none; border-top:1px solid var(--border); margin:12px 0; }

/* ── Usage Chart ── */
.usage-bar { height:8px; border-radius:4px; background:var(--bg-input); margin:4px 0; overflow:hidden; }
.usage-bar .fill { height:100%; border-radius:4px; transition:width 0.3s; }
.usage-stats { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.usage-stat { padding:10px; background:var(--bg-elevated); border:1px solid var(--border); border-radius:var(--radius); }
.usage-stat .us-value { font-size:18px; font-weight:600; }
.usage-stat .us-label { font-size:11px; color:var(--text-dim); }

/* ── Responsive ── */
@media (max-width:900px) {
  :root { --thread-w:220px; --panel-w:280px; }
}
@media (max-width:700px) {
  .thread-sidebar { display:none; }
  :root { --sidebar-w:48px; }
}
</style>
</head>
<body>

<!-- Auth Gate -->
<div id="auth-gate">
  <div class="auth-card">
    <div class="logo">Code<span>Whale</span></div>
    <p>AI-powered coding assistant</p>
    <div class="auth-error" id="auth-error"></div>
    <label>Server URL</label>
    <input type="text" id="api-url" placeholder="http://127.0.0.1:7878" value="http://127.0.0.1:7878">
    <label>Token</label>
    <input type="text" id="api-token" placeholder="Leave empty if --insecure">
    <button class="connect" onclick="connect()">Connect</button>
  </div>
</div>

<!-- Main App -->
<div id="app">
<div class="app-layout">

  <!-- Icon Sidebar -->
  <nav class="icon-sidebar">
    <button class="logo-btn" title="CodeWhale">W</button>
    <div class="nav-group">
      <button class="active" data-view="chat" title="Chat (Ctrl+1)">

<input type="file" id="file-input" style="display:none" multiple>

<script>
// ══════════════════════════════════════════════════════════════
// State
// ══════════════════════════════════════════════════════════════
const S = {
  api: '', token: '', threads: [], currentId: null, items: [],
  isStreaming: false, eventSource: null, currentSeq: 0,
  streamingItems: {}, currentApproval: null, currentView: 'chat',
  panelView: null, autoScroll: true,
};

// ══════════════════════════════════════════════════════════════
// API Helpers
// ══════════════════════════════════════════════════════════════
function headers() { const h={'Content-Type':'application/json'}; if(S.token) h['Authorization']=`Bearer ${S.token}`; return h; }
async function api(path, opts={}) {
  const r = await fetch(`${S.api}${path}`, {...opts, headers:{...headers(),...opts.headers}});
  if(!r.ok) throw new Error(`${r.status}: ${await r.text()}`);
  if(r.status===204) return null;
  return r.json();
}

// ══════════════════════════════════════════════════════════════
// Auth
// ══════════════════════════════════════════════════════════════
async function connect() {
  const url = document.getElementById('api-url').value.trim().replace(/\/+$/,'');
  const token = document.getElementById('api-token').value.trim();
  const err = document.getElementById('auth-error');
  try {
    const h = {}; if(token) h['Authorization']=`Bearer ${token}`;
    const r = await fetch(`${url}/health`,{h});
    if(!r.ok) throw new Error(`HTTP ${r.status}`);
  } catch(e) { err.textContent=`Connection failed: ${e.message}`; err.style.display='block'; return; }
  S.api=url; S.token=token;
  localStorage.setItem('cw_api',url); localStorage.setItem('cw_token',token);
  document.getElementById('auth-gate').style.display='none';
  document.getElementById('app').style.display='block';
  await loadThreads();
  loadWorkspace();
}
window.addEventListener('DOMContentLoaded',()=>{
  const a=localStorage.getItem('cw_api'), t=localStorage.getItem('cw_token');
  if(a) { document.getElementById('api-url').value=a; document.getElementById('api-token').value=t||''; }
});

// ══════════════════════════════════════════════════════════════
// Threads
// ══════════════════════════════════════════════════════════════
async function loadThreads(opts={}) {
  try {
    let url = '/v1/threads/summary?limit=100';
    if(opts.archived) url += '&archived_only=true';
    if(opts.search) url += `&search=${encodeURIComponent(opts.search)}`;
    S.threads = await api(url);
  } catch(e) { S.threads=[]; }
  renderThreadList();
}

function renderThreadList() {
  const list = document.getElementById('thread-list');
  const count = document.getElementById('thread-count');
  count.textContent = S.threads.length ? `(${S.threads.length})` : '';
  if(!S.threads.length) {
    list.innerHTML='<div style="padding:20px;text-align:center;color:var(--text-dim);font-size:13px">No threads yet</div>';
    return;
  }
  list.innerHTML = S.threads.map(t => {
    const active = t.id===S.currentId?' active':'';
    const status = t.latest_turn_status||'completed';
    const title = t.title||t.preview||'New thread';
    const time = t.updated_at ? timeAgo(new Date(t.updated_at)) : '';
    return `<div class="thread-item${active}" onclick="selectThread('${t.id}')">
      <div class="t-title"><span class="t-status s-${status}"></span>${esc(title)}</div>
      <div class="t-meta">${esc(t.model||'')} ${time}</div>
      <div class="t-actions">
        <button onclick="event.stopPropagation();forkThreadById('${t.id}')" title="Fork">F</button>
        <button onclick="event.stopPropagation();archiveThread('${t.id}')" title="Archive">A</button>
      </div>
    </div>`;
  }).join('');
}

async function newThread() {
  try {
    const t = await api('/v1/threads',{method:'POST',body:'{}'});
    await loadThreads();
    await selectThread(t.id);
  } catch(e) { alert('Failed: '+e.message); }
}

async function selectThread(id) {
  if(S.eventSource) { S.eventSource.close(); S.eventSource=null; }
  S.currentId=id; S.isStreaming=false; S.currentSeq=0; S.streamingItems={};
  renderThreadList();
  document.getElementById('chat-header').style.display='flex';
  document.getElementById('prompt-input').disabled=false;
  document.getElementById('send-btn').disabled=false;
  document.getElementById('prompt-input').focus();
  switchView('chat');

  try {
    const data = await api(`/v1/threads/${id}`);
    const t = data.thread;
    document.getElementById('ch-title').textContent = t.title||'Thread';
    document.getElementById('ch-model').textContent = t.model||'auto';
    const mode = t.mode||'agent';
    const modeEl = document.getElementById('ch-mode');
    modeEl.textContent = mode;
    modeEl.className = `ch-mode ${mode}`;
    S.currentSeq = data.latest_seq||0;
    renderMessages(data.items||[]);
    scrollToBottom();
    connectSSE(id);
  } catch(e) {
    document.getElementById('messages').innerHTML=`<div class="empty-state"><p>Failed: ${esc(e.message)}</p></div>`;
  }
}

async function archiveThread(id) {
  try { await api(`/v1/threads/${id}`,{method:'PATCH',body:JSON.stringify({archived:true})}); await loadThreads(); } catch(e) {}
}

async function forkThread() {
  if(!S.currentId) return;
  try {
    const t = await api(`/v1/threads/${S.currentId}/fork`,{method:'POST'});
    await loadThreads();
    await selectThread(t.id);
  } catch(e) { alert('Fork failed: '+e.message); }
}

async function forkThreadById(id) {
  try {
    const t = await api(`/v1/threads/${id}/fork`,{method:'POST'});
    await loadThreads();
    await selectThread(t.id);
  } catch(e) { alert('Fork failed: '+e.message); }
}

async function compactThread() {
  if(!S.currentId) return;
  try { await api(`/v1/threads/${S.currentId}/compact`,{method:'POST',body:'{}'}); } catch(e) { alert('Compact failed: '+e.message); }
}

async function exportThread() {
  if(!S.currentId) return;
  try {
    const data = await api(`/v1/threads/${S.currentId}`);
    const text = (data.items||[]).map(i => {
      if(i.kind==='user_message') return `**You:** ${i.detail||i.summary||''}`;
      if(i.kind==='agent_message') return `**Agent:** ${i.detail||i.summary||''}`;
      if(i.kind==='tool_call') return `[Tool: ${i.summary||''}]`;
      return `[${i.kind}: ${i.summary||''}]`;
    }).join('\n\n');
    const blob = new Blob([text],{type:'text/plain'});
    const a = document.createElement('a');
    a.href=URL.createObjectURL(blob); a.download=`thread-${S.currentId}.txt`; a.click();
  } catch(e) {}
}

// Thread search
document.addEventListener('DOMContentLoaded',()=>{
  const si = document.getElementById('thread-search');
  let timer;
  si.addEventListener('input',()=>{
    clearTimeout(timer);
    timer = setTimeout(()=>loadThreads({search:si.value.trim()}), 300);
  });
});

// ══════════════════════════════════════════════════════════════
// Messages
// ══════════════════════════════════════════════════════════════
function renderMessages(items) {
  S.items = items;
  const c = document.getElementById('messages');
  if(!items.length) {
    c.innerHTML='<div class="empty-state"><div class="es-icon">W</div><p>Send a message to start</p></div>';
    return;
  }
  c.innerHTML = items.map(renderItem).join('');
}

function renderItem(item) {
  const k = item.kind;
  if(k==='user_message') {
    return `<div class="msg-wrap"><div class="msg msg-user"><div class="msg-label">You</div><div class="msg-bubble">${renderMd(item.detail||item.summary||'')}</div></div></div>`;
  }
  if(k==='agent_message') {
    return `<div class="msg-wrap"><div class="msg msg-agent" id="item-${item.id}"><div class="msg-label">Agent</div><div class="msg-bubble">${renderMd(item.detail||item.summary||'')}</div></div></div>`;
  }
  if(k==='agent_reasoning') {
    const body = esc(item.detail||item.summary||'');
    return `<div class="reasoning" id="item-${item.id}"><div class="reasoning-header" onclick="this.nextElementSibling.classList.toggle('open')"><span>Thinking</span><span class="arrow">▶</span></div><div class="reasoning-body">${body}</div></div>`;
  }
  if(k==='tool_call') {
    return `<div class="tool-call" id="item-${item.id}"><div class="tool-header" onclick="this.nextElementSibling.classList.toggle('open');this.querySelector('.arrow').classList.toggle('open')"><span class="tool-icon">⚙</span><span class="tool-name">${esc(item.summary||'Tool')}</span><span class="tool-status done">done</span><span class="arrow">▶</span></div><div class="tool-body">${esc(item.detail||'')}</div></div>`;
  }
  if(k==='error') {
    return `<div class="msg-wrap"><div class="msg msg-agent"><div class="msg-bubble" style="border-color:var(--red);color:var(--red)">${esc(item.detail||item.summary||'Error')}</div></div></div>`;
  }
  if(k==='file_change') {
    return `<div class="tool-call"><div class="tool-header"><span class="tool-icon">F</span><span class="tool-name">${esc(item.summary||'File change')}</span><span class="tool-status done">done</span></div></div>`;
  }
  if(k==='command_execution') {
    return `<div class="tool-call"><div class="tool-header" onclick="this.nextElementSibling.classList.toggle('open');this.querySelector('.arrow').classList.toggle('open')"><span class="tool-icon">></span><span class="tool-name">${esc(item.summary||'Command')}</span><span class="tool-status done">done</span><span class="arrow">▶</span></div><div class="tool-body">${esc(item.detail||'')}</div></div>`;
  }
  return `<div style="text-align:center;padding:4px;font-size:11px;color:var(--text-dim)">${esc(item.summary||k)}</div>`;
}

// ══════════════════════════════════════════════════════════════
// SSE
// ══════════════════════════════════════════════════════════════
function connectSSE(threadId) {
  if(S.eventSource) S.eventSource.close();
  const url = `${S.api}/v1/threads/${threadId}/events?since_seq=${S.currentSeq}${S.token?'&token='+encodeURIComponent(S.token):''}`;
  S.eventSource = new EventSource(url);

  S.eventSource.addEventListener('item.started', e => handleItemStarted(JSON.parse(e.data)));
  S.eventSource.addEventListener('item.delta', e => handleItemDelta(JSON.parse(e.data)));
  S.eventSource.addEventListener('item.completed', e => handleItemCompleted(JSON.parse(e.data)));
  S.eventSource.addEventListener('item.failed', e => handleItemCompleted(JSON.parse(e.data)));
  S.eventSource.addEventListener('turn.started', () => {
    S.isStreaming=true;
    document.getElementById('streaming-bar').classList.add('active');
    document.getElementById('send-btn').disabled=true;
    updateStatusBar('Working...');
  });
  S.eventSource.addEventListener('turn.completed', () => {
    S.isStreaming=false;
    document.getElementById('streaming-bar').classList.remove('active');
    document.getElementById('send-btn').disabled=false;
    updateStatusBar('');
    if(S.currentId) refreshThread();
  });
  S.eventSource.addEventListener('approval.required', e => handleApproval(JSON.parse(e.data)));
  S.eventSource.addEventListener('turn.lifecycle', ()=>{});
  S.eventSource.onerror = ()=>{};
}

function handleItemStarted(data) {
  const p = data.payload||{};
  const kind = p.kind||data.kind||'agent_message';
  const id = data.item_id;
  S.streamingItems[id] = {kind, text:''};
  const c = document.getElementById('messages');
  const empty = c.querySelector('.empty-state'); if(empty) empty.remove();

  if(kind==='agent_message') {
    const d=document.createElement('div'); d.className='msg-wrap';
    d.innerHTML=`<div class="msg msg-agent" id="stream-${id}"><div class="msg-label">Agent</div><div class="msg-bubble"><span class="streaming-dot"></span></div></div>`;
    c.appendChild(d);
  } else if(kind==='agent_reasoning') {
    const d=document.createElement('div'); d.className='reasoning'; d.id=`stream-${id}`;
    d.innerHTML=`<div class="reasoning-header"><span>Thinking...</span></div><div class="reasoning-body open"></div>`;
    c.appendChild(d);
  } else if(kind==='tool_call') {
    const d=document.createElement('div'); d.className='tool-call'; d.id=`stream-${id}`;
    d.innerHTML=`<div class="tool-header"><span class="tool-icon">⚙</span><span class="tool-name">${esc(p.summary||p.tool?.name||'Tool')}</span><span class="tool-status running">running</span><span class="arrow open">▶</span></div><div class="tool-body open"></div>`;
    c.appendChild(d);
  } else if(kind==='status') {
    const d=document.createElement('div'); d.id=`stream-${id}`;
    d.style.cssText='text-align:center;padding:4px;font-size:11px;color:var(--text-dim)';
    d.textContent=p.summary||'Working...';
    c.appendChild(d);
  }
  if(S.autoScroll) scrollToBottom();
}

function handleItemDelta(data) {
  const p=data.payload||{};
  const id=data.item_id;
  if(!S.streamingItems[id]) S.streamingItems[id]={kind:'agent_message',text:''};
  S.streamingItems[id].text += p.delta||'';
  const el=document.getElementById(`stream-${id}`);
  if(!el) return;
  const k=S.streamingItems[id].kind;
  if(k==='agent_message') {
    const b=el.querySelector('.msg-bubble');
    if(b) b.innerHTML=renderMd(S.streamingItems[id].text);
  } else if(k==='agent_reasoning') {
    const b=el.querySelector('.reasoning-body');
    if(b) b.textContent=S.streamingItems[id].text;
  } else if(k==='tool_call') {
    const b=el.querySelector('.tool-body');
    if(b) b.textContent=S.streamingItems[id].text;
  }
  if(S.autoScroll) scrollToBottom();
}

function handleItemCompleted(data) {
  const id=data.item_id;
  const el=document.getElementById(`stream-${id}`);
  if(el) el.closest('.msg-wrap')?.remove() || el.remove();
  delete S.streamingItems[id];
  if(S.currentId) refreshThread();
}

async function refreshThread() {
  try {
    const data = await api(`/v1/threads/${S.currentId}`);
    renderMessages(data.items||[]);
    S.currentSeq = data.latest_seq||S.currentSeq;
    if(S.autoScroll) scrollToBottom();
  } catch(e) {}
}

// ══════════════════════════════════════════════════════════════
// Approval
// ══════════════════════════════════════════════════════════════
function handleApproval(data) {
  S.currentApproval = data;
  const id = data.approval_id||data.id;
  const tool = data.tool_name||data.name||'tool';
  const desc = data.description||data.input_summary||'';
  const isDestructive = data.risk_level==='destructive';

  document.getElementById('approval-title').textContent = `Allow "${tool}"?`;
  document.getElementById('approval-desc').textContent = desc||`The agent wants to run: ${tool}`;
  document.getElementById('approval-tool').textContent = JSON.stringify(data.input||data.parameters||data,null,2);
  document.getElementById('approval-card').className = `approval-card${isDestructive?' destructive':''}`;
  document.getElementById('approval-overlay').classList.add('open');
}

async function decideApproval(decision) {
  if(!S.currentApproval) return;
  const id = S.currentApproval.approval_id||S.currentApproval.id;
  try {
    await api(`/v1/approvals/${id}`,{
      method:'POST',
      body:JSON.stringify({decision:decision==='allow_session'?'allow':decision, remember:decision==='allow_session'})
    });
  } catch(e) { console.error('Approval failed:',e); }
  document.getElementById('approval-overlay').classList.remove('open');
  S.currentApproval=null;
}

// ══════════════════════════════════════════════════════════════
// Send Message
// ══════════════════════════════════════════════════════════════
async function sendMessage() {
  const input = document.getElementById('prompt-input');
  const text = input.value.trim();
  if(!text||!S.currentId||S.isStreaming) return;
  input.value=''; input.style.height='auto';
  const c=document.getElementById('messages');
  const empty=c.querySelector('.empty-state'); if(empty) empty.remove();
  const d=document.createElement('div'); d.className='msg-wrap';
  d.innerHTML=`<div class="msg msg-user"><div class="msg-label">You</div><div class="msg-bubble">${renderMd(text)}</div></div>`;
  c.appendChild(d);
  if(S.autoScroll) scrollToBottom();
  try {
    await api(`/v1/threads/${S.currentId}/turns`,{method:'POST',body:JSON.stringify({prompt:text})});
  } catch(e) {
    const ed=document.createElement('div'); ed.className='msg-wrap';
    ed.innerHTML=`<div class="msg msg-agent"><div class="msg-bubble" style="border-color:var(--red);color:var(--red)">Failed: ${esc(e.message)}</div></div>`;
    c.appendChild(ed);
  }
}

// ══════════════════════════════════════════════════════════════
// Steer & Interrupt
// ══════════════════════════════════════════════════════════════
async function interruptTurn() {
  if(!S.currentId||!S.isStreaming) return;
  try {
    const data = await api(`/v1/threads/${S.currentId}`);
    const activeTurn = (data.turns||[]).find(t=>t.status==='in_progress');
    if(activeTurn) {
      await api(`/v1/threads/${S.currentId}/turns/${activeTurn.id}/interrupt`,{method:'POST'});
    }
  } catch(e) {}
}

// Command Palette
// ══════════════════════════════════════════════════════════════
const PALETTE_ITEMS = [
  {name:'New Chat', desc:'Create a new thread', icon:'+', action:()=>newThread(), shortcut:'Ctrl+N'},
  {name:'Tasks', desc:'View background tasks', icon:'T', action:()=>switchView('tasks')},
  {name:'Agents', desc:'View sub-agents', icon:'A', action:()=>switchView('agents')},
  {name:'MCP & Skills', desc:'MCP servers and skills', icon:'M', action:()=>switchView('mcp')},
  {name:'Automations', desc:'Scheduled automations', icon:'C', action:()=>switchView('automations')},
  {name:'Usage', desc:'Token and cost usage', icon:'U', action:()=>switchView('usage')},
  {name:'Context Inspector', desc:'View context and workspace', icon:'I', action:()=>switchView('context')},
  {name:'Settings', desc:'Configure CodeWhale', icon:'S', action:()=>switchView('settings')},
  {name:'Compact Context', desc:'Compress conversation context', icon:'Z', action:()=>compactThread()},
  {name:'Fork Thread', desc:'Fork current thread', icon:'F', action:()=>forkThread()},
  {name:'Export Thread', desc:'Download transcript', icon:'E', action:()=>exportThread()},
  {name:'Interrupt', desc:'Stop current generation', icon:'X', action:()=>interruptTurn()},
  {name:'Disconnect', desc:'Logout and disconnect', icon:'Q', action:()=>disconnect()},
];

let paletteSelected = 0;

function openPalette() {
  document.getElementById('palette-overlay').classList.add('open');
  const input = document.getElementById('palette-input');
  input.value=''; input.focus();
  paletteSelected=0;
  renderPalette('');
}

function closePalette() {
  document.getElementById('palette-overlay').classList.remove('open');
}

function renderPalette(query) {
  const results = document.getElementById('palette-results');
  const items = PALETTE_ITEMS.filter(i => !query || i.name.toLowerCase().includes(query.toLowerCase()) || i.desc.toLowerCase().includes(query.toLowerCase()));
  if(paletteSelected>=items.length) paletteSelected=0;
  results.innerHTML = items.map((i,idx) => `
    <div class="palette-item${idx===paletteSelected?' selected':''}" onclick="PALETTE_ITEMS[${PALETTE_ITEMS.indexOf(i)}].action();closePalette()">
      <div class="pi-icon">${i.icon}</div>
      <div class="pi-text"><div class="pi-name">${esc(i.name)}</div><div class="pi-desc">${esc(i.desc)}</div></div>
      ${i.shortcut?`<div class="pi-shortcut"><kbd>${i.shortcut}</kbd></div>`:''}
    </div>
  `).join('');
}

document.addEventListener('DOMContentLoaded',()=>{
  const input = document.getElementById('palette-input');
  input.addEventListener('input',()=>{ paletteSelected=0; renderPalette(input.value); });
  input.addEventListener('keydown',e=>{
    const items = PALETTE_ITEMS.filter(i => !input.value || i.name.toLowerCase().includes(input.value.toLowerCase()));
    if(e.key==='ArrowDown') { e.preventDefault(); paletteSelected=Math.min(paletteSelected+1,items.length-1); renderPalette(input.value); }
    if(e.key==='ArrowUp') { e.preventDefault(); paletteSelected=Math.max(paletteSelected-1,0); renderPalette(input.value); }
    if(e.key==='Enter') { e.preventDefault(); if(items[paletteSelected]) { items[paletteSelected].action(); closePalette(); } }
    if(e.key==='Escape') { closePalette(); }
  });
  document.getElementById('palette-overlay').addEventListener('click',e=>{ if(e.target===e.currentTarget) closePalette(); });
});

document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('file-input').addEventListener('change',async e=>{
    const files = e.target.files;
    if(!files.length) return;
    const input = document.getElementById('prompt-input');
    let text = input.value;
    for(const f of files) {
      if(f.type.startsWith('image/')) {
        text += `\n[Attached image: ${f.name}]`;
      } else {
        text += `\n@${f.name}`;
      }
    }
    input.value = text;
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight,200)+'px';
    input.focus();
    e.target.value='';
  });
});

      api(`/v1/threads/${S.currentId}`,{method:'PATCH',body:JSON.stringify({title:title.textContent.trim()})}).catch(()=>{});

// ══════════════════════════════════════════════════════════════
// Keyboard Shortcuts
// ══════════════════════════════════════════════════════════════
document.addEventListener('keydown',e=>{
  // Ctrl+K: Command palette
  if((e.ctrlKey||e.metaKey)&&e.key==='k') { e.preventDefault(); openPalette(); return; }
  // Ctrl+N: New thread
  if((e.ctrlKey||e.metaKey)&&e.key==='n') { e.preventDefault(); newThread(); return; }
  // Ctrl+1-6: Switch panels
  if((e.ctrlKey||e.metaKey)&&e.key>='1'&&e.key<='6') {
    e.preventDefault();
    const views = ['chat','tasks','agents','mcp','automations','usage'];
    switchView(views[parseInt(e.key)-1]);
    return;
  }
  // Escape: Close panel/palette or interrupt
  if(e.key==='Escape') {
    if(document.getElementById('palette-overlay').classList.contains('open')) { closePalette(); return; }
    if(document.getElementById('approval-overlay').classList.contains('open')) { return; }
    if(S.panelView) { closePanel(); return; }
    if(S.isStreaming) { interruptTurn(); return; }
  }
});

// ══════════════════════════════════════════════════════════════
// Input Handling
// ══════════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded',()=>{
  const ta = document.getElementById('prompt-input');
  ta.addEventListener('keydown',e=>{
    if(e.key==='Enter'&&!e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  ta.addEventListener('input',()=>{
    ta.style.height='auto';
    ta.style.height=Math.min(ta.scrollHeight,200)+'px';
  });
  // Scroll detection for auto-scroll
  const messages = document.getElementById('messages');
  messages.addEventListener('scroll',()=>{
    const atBottom = messages.scrollHeight - messages.scrollTop - messages.clientHeight < 100;
    S.autoScroll = atBottom;
  });
});

// ══════════════════════════════════════════════════════════════
// Markdown Renderer
// ══════════════════════════════════════════════════════════════
function renderMd(text) {
  if(!text) return '';
  let s = esc(text);
  // Fenced code blocks
  s = s.replace(/```(\w*)\n([\s\S]*?)```/g, (_,lang,code) => {
    const label = lang||'code';
    return `<pre><div class="code-header"><span>${label}</span><button onclick="copyCode(this)">Copy</button></div><code>${code}</code></pre>`;
  });
  // Inline code
  s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Bold
  s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Italic
  s = s.replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g, '<em>$1</em>');
  // Links
  s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  // Headers
  s = s.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  s = s.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  s = s.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  // Horizontal rule
  s = s.replace(/^---+$/gm, '<hr>');
  // Blockquote
  s = s.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
  // Tables (basic)
  s = s.replace(/^\|(.+)\|$/gm, (match, content) => {
    const cells = content.split('|').map(c=>c.trim());
    if(cells.every(c=>/^[-:]+$/.test(c))) return '';
    const tag = 'td';
    return '<tr>' + cells.map(c=>`<${tag}>${c}</${tag}>`).join('') + '</tr>';
  });
  s = s.replace(/(<tr>.*<\/tr>)/gs, '<table>$1</table>');
  // Lists
  s = s.replace(/^(\d+)\. (.+)$/gm, '<li>$2</li>');
  s = s.replace(/^- (.+)$/gm, '<li>$1</li>');
  s = s.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');
  // Paragraphs (double newline)
  s = s.replace(/\n\n/g, '</p><p>');
  s = `<p>${s}</p>`;
  // Single newlines in non-pre blocks
  s = s.replace(/(?<!<\/?(?:pre|code|ul|ol|li|h[1-6]|blockquote|table|tr|th|td)[^>]*>)\n/g, '<br>');
  return s;
}

function copyCode(btn) {
  const code = btn.closest('pre').querySelector('code').textContent;
  navigator.clipboard.writeText(code);
  btn.textContent='Copied!'; setTimeout(()=>btn.textContent='Copy',1500);
}

// ══════════════════════════════════════════════════════════════
// Utils
// ══════════════════════════════════════════════════════════════
function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
function scrollToBottom() { const m=document.getElementById('messages'); m.scrollTop=m.scrollHeight; }
function timeAgo(d) { const s=Math.floor((Date.now()-d.getTime())/1000); if(s<60)return 'just now'; if(s<3600)return Math.floor(s/60)+'m ago'; if(s<86400)return Math.floor(s/3600)+'h ago'; return Math.floor(s/86400)+'d ago'; }
function fmtNum(n) { if(!n) return '0'; if(n>=1e6) return (n/1e6).toFixed(1)+'M'; if(n>=1e3) return (n/1e3).toFixed(1)+'k'; return n.toString(); }
