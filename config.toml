# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║                         DeepSeek TUI Configuration                            ║
# ║                         本地化配置 / Localized Configuration                     ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

# ─────────────────────────────────────────────────────────────────────────────────
# Active provider + DeepSeek defaults
# ─────────────────────────────────────────────────────────────────────────────────
provider = "deepseek"
api_key = "sk-f1bccc35f03d4e90be027a54ef02399a"
base_url = "https://api.deepseek.com/beta"

# ─────────────────────────────────────────────────────────────────────────────────
# Default Models
# ─────────────────────────────────────────────────────────────────────────────────
default_text_model = "deepseek-v4-pro"

# ─────────────────────────────────────────────────────────────────────────────────
# Thinking Mode (DeepSeek V4 reasoning effort)
# ─────────────────────────────────────────────────────────────────────────────────
# "off"    — 禁用思维链
# "high"   — reasoning_effort = high (DeepSeek 默认)
# "max"    — reasoning_effort = max (最深推理)
reasoning_effort = "max"

# ─────────────────────────────────────────────────────────────────────────────────
# Cost Display (费用显示)
# ─────────────────────────────────────────────────────────────────────────────────
cost_currency = "cny"  # 人民币显示

# ─────────────────────────────────────────────────────────────────────────────────
# Paths (路径)
# ─────────────────────────────────────────────────────────────────────────────────
skills_dir = "~/.deepseek/skills"
mcp_config_path = "~/.deepseek/mcp.json"
notes_path = "~/.deepseek/notes.txt"
memory_path = "~/.deepseek/memory.md"

# ─────────────────────────────────────────────────────────────────────────────────
# User memory (用户记忆)
# ─────────────────────────────────────────────────────────────────────────────────
[memory]
enabled = true

# ─────────────────────────────────────────────────────────────────────────────────
# Security (安全设置)
# ─────────────────────────────────────────────────────────────────────────────────
allow_shell = true
approval_policy = "on-request"  # on-request | untrusted | never
sandbox_mode = "workspace-write"  # read-only | workspace-write | danger-full-access

# Auto-allow: 自动批准的命令前缀
auto_allow = ["git status", "git log", "cargo check", "npm run", "cargo build"]
max_subagents = 10

# ─────────────────────────────────────────────────────────────────────────────────
# Web Search Provider (搜索引擎)
# ─────────────────────────────────────────────────────────────────────────────────
[search]
provider = "tavily"  # bing | duckduckgo | tavily | bocha
# api_key = "tvly-YOUR-KEY"  # Tavily API Key

# ─────────────────────────────────────────────────────────────────────────────────
# Network Policy (网络策略)
# ─────────────────────────────────────────────────────────────────────────────────
[network]
default = "allow"
allow = ["api.deepseek.com", "github.com", ".githubusercontent.com", "api.tavily.com"]
deny = []
audit = true

# ─────────────────────────────────────────────────────────────────────────────────
# Skills (技能系统)
# ─────────────────────────────────────────────────────────────────────────────────
[skills]
registry_url = "https://raw.githubusercontent.com/Hmbown/deepseek-skills/main/index.json"
max_install_size_bytes = 5_242_880

# ─────────────────────────────────────────────────────────────────────────────────
# TUI (终端界面)
# ─────────────────────────────────────────────────────────────────────────────────
[tui]
alternate_screen = "auto"
mouse_capture = true
terminal_probe_timeout_ms = 500
osc8_links = true
locale = "zh-Hans"  # UI语言: auto | en | ja | zh-Hans | pt-BR

# ─────────────────────────────────────────────────────────────────────────────────
# Feature Flags (功能开关)
# ─────────────────────────────────────────────────────────────────────────────────
[features]
shell_tool = true
subagents = true
web_search = true
apply_patch = true
mcp = true
exec_policy = true

# ─────────────────────────────────────────────────────────────────────────────────
# Retry Configuration (重试配置)
# ─────────────────────────────────────────────────────────────────────────────────
[retry]
enabled = true
max_retries = 3
initial_delay = 1.0
max_delay = 60.0
exponential_base = 2.0

# ─────────────────────────────────────────────────────────────────────────────────
# Context Compaction (上下文压缩)
# ─────────────────────────────────────────────────────────────────────────────────
[context]
enabled = true
verbatim_window_turns = 16
l1_threshold = 192000
l2_threshold = 384000
l3_threshold = 576000
cycle_threshold = 768000
seam_model = "deepseek-v4-flash"

# ─────────────────────────────────────────────────────────────────────────────────
# Notifications (桌面通知)
# ─────────────────────────────────────────────────────────────────────────────────
[notifications]
method = "auto"
threshold_secs = 30
include_summary = true

# ─────────────────────────────────────────────────────────────────────────────────
# Workspace Snapshots (工作区快照)
# ─────────────────────────────────────────────────────────────────────────────────
[snapshots]
enabled = true
max_age_days = 7
max_workspace_gb = 2

# ─────────────────────────────────────────────────────────────────────────────────
# LSP Diagnostics (语言服务器诊断)
# ─────────────────────────────────────────────────────────────────────────────────
[lsp]
enabled = true
poll_after_edit_ms = 5000
max_diagnostics_per_file = 20
include_warnings = true

# ─────────────────────────────────────────────────────────────────────────────────
# Hooks (钩子系统)
# ─────────────────────────────────────────────────────────────────────────────────
[hooks]
enabled = true
default_timeout_secs = 30

# [[hooks.hooks]]
# event = "session_start"
# command = "echo 'DeepSeek TUI 会话已启动'"

# ─────────────────────────────────────────────────────────────────────────────────
# Runtime API (运行时API)
# ─────────────────────────────────────────────────────────────────────────────────
[runtime_api]
cors_origins = ["http://localhost:3000", "http://localhost:5173"]

# ─────────────────────────────────────────────────────────────────────────────────
# DeepSeek Platform (DeepSeek平台配置)
# ─────────────────────────────────────────────────────────────────────────────────
[providers.deepseek]
api_key = "sk-f1bccc35f03d4e90be027a54ef02399a"
base_url = "https://api.deepseek.com/beta"
model = "deepseek-v4-pro"