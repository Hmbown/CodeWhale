name: Agent task
description: Create a self-contained task that an autonomous agent can execute end-to-end without human context.
title: ""
labels: ["agent-ready"]
body:
  - type: markdown
    attributes:
      value: |
        ## Instructions for authors

        This issue may be executed by an autonomous agent running CodeWhale locally
        or on a remote worker. The body must be **self-sufficient**: every file
        path, command, dependency, and acceptance criterion must be explicit. The
        default operating contract is:

        - Branch from current `origin/main` as `codex/issue-N-short-slug`.
        - Solve this issue on that branch and open a PR against `main`.
        - Include `Closes #N` or `Fixes #N` in the PR body.
        - Multiple agents may work concurrently when their file sets do not conflict.
        - Use scratch branches only to test batch merge order/conflicts, not as
          the final shipping PR.
        - Assume no conversation context: this issue body is all the agent knows.

        Fill every section.  Sections marked * are required.

  - type: textarea
    id: goal
    attributes:
      label: "Goal / Why"
      description: "What problem does this fix, and why now? (2-4 sentences)"
      placeholder: |
        e.g. "The TUI freezes when 4+ sub-agents run concurrently because
        AgentProgress events trigger a full redraw each.  This blocks v0.8.58's
        recommended sub-agent fanout."
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: "Scope / Plan"
      description: "Numbered steps with file paths. Each step is one concrete action."
      placeholder: |
        1. crates/tui/src/tui/ui.rs — add throttle in AgentProgress handler (line ~2308)
        2. crates/tui/src/tui/app.rs — add `last_agent_progress_redraw` field
        3. cargo test -p codewhale-tui — verify no regressions
    validations:
      required: true

  - type: textarea
    id: key-files
    attributes:
      label: "Key files"
      description: "One file path per line. The agent will read these first and use them to detect conflicts with parallel work."
      placeholder: |
        crates/tui/src/tui/ui.rs
        crates/tui/src/tui/sidebar.rs
        crates/tui/src/tui/app.rs
    validations:
      required: true

  - type: textarea
    id: parallelism
    attributes:
      label: "Parallelism / conflict notes"
      description: "Name files, issues, or PRs that should not run concurrently with this task. Say 'none known' if isolated."
      placeholder: |
        Avoid running in parallel with #1234 because both touch crates/tui/src/tui/ui.rs.
        Safe to run alongside docs-only or provider-catalog tasks.
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: "Acceptance criteria"
      description: "Behavior-level checkboxes.  Every item must be testable."
      placeholder: |
        - [ ] 4 concurrent sub-agents do not freeze TUI input
        - [ ] Ctrl+C works during sub-agent activity
        - [ ] Sidebar updates throttle under load
    validations:
      required: true

  - type: textarea
    id: verification
    attributes:
      label: "Verification"
      description: "Exact shell commands the agent must run to prove the fix works."
      placeholder: |
        cargo check -p codewhale-tui
        cargo test -p codewhale-tui -- subagent
        cargo clippy -p codewhale-tui -- -D warnings
    validations:
      required: true

  - type: textarea
    id: out-of-scope
    attributes:
      label: "Out of scope"
      description: "What this issue does NOT change.  Prevents scope creep."
      placeholder: |
        - Changing the sub-agent execution model
        - Reducing the recommended fanout count
        - Network-level optimizations
    validations:
      required: true
